site_name: SlayBot Documentation
site_description: Documentation complète et générée automatiquement du projet SlayBot
site_author: MHI-Inc
repo_name: GitHub/SlayBot

nav:
  - Accueil: index.md
  - Architecture: architecture.md
  - Documentation de déploiement: documentation.md
  - Installation: installation.md
  - Modules:
      - site_commande: site_commande.md
      - slaybot_apk: slaybot_apk.md
      - slaybot_hotspot: slaybot_hotspot.md
      - slaybot_screen: slaybot_screen.md
      - slaybot_table: slaybot_table.md
      - slaybot_utilitaire_dev: slaybot_utilitaire_dev.md
  - API: api.md
  - Informations:
      - Contribution: contributing.md
      - Licence: license.md
      - Règle de conduite: code_of_conduct.md

plugins:
  - search
  - mermaid2
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - "import sys, os; sys.path.insert(0, os.path.abspath('.'))"
          options:
            show_source: false   
            show_root_heading: true
            show_category_heading: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true

theme:
  name: material
  language: fr
  palette:
    scheme: default
    primary: indigo
    accent: teal
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tabs
    - content.code.copy
    - header.autohide

repo_url: https://github.com/ismael-belghazi/Slaybot
edit_uri: ""

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ismael-belghazi/Slaybot
