<!DOCTYPE html>
<html lang="fr">
<head>
    <title>SLAYBOT | TACTICAL VISION</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link id="favicon" rel="icon" type="image/x-icon" href="">
    <style>
        :root {
            --neon-green: #00ff41;
            --bg-black: #0a0a0a;
            --panel-bg: rgba(0, 255, 65, 0.03);
            --font-main: 'Segoe UI', 'Ubuntu Mono', monospace;
        }

        body { 
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: var(--font-main);
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Effet scanlines global */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
            z-index: 100; pointer-events: none;
        }

        /* Écran d'initialisation */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-black);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .boot-text {
            font-family: 'Ubuntu Mono', monospace;
            font-size: 1.2rem;
            margin-top: 20px;
        }

        /* Main Frame */
        .main-frame {
            position: relative;
            width: 90vw; max-width: 1000px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 10px;
            z-index: 10;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            font-size: 0.9rem;
        }

        /* CONTENEUR VIDÉO AVEC HUD TACTIQUE */
        .video-container {
            position: relative;
            background: #000;
            line-height: 0;
            border: 1px solid rgba(0, 255, 65, 0.1);
            overflow: hidden;
        }

        /* Coins du viseur */
        .video-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(to right, var(--neon-green) 2px, transparent 2px) 0 0,
                linear-gradient(to bottom, var(--neon-green) 2px, transparent 2px) 0 0,
                linear-gradient(to left, var(--neon-green) 2px, transparent 2px) 100% 0,
                linear-gradient(to bottom, var(--neon-green) 2px, transparent 2px) 100% 0,
                linear-gradient(to right, var(--neon-green) 2px, transparent 2px) 0 100%,
                linear-gradient(to top, var(--neon-green) 2px, transparent 2px) 0 100%,
                linear-gradient(to left, var(--neon-green) 2px, transparent 2px) 100% 100%,
                linear-gradient(to top, var(--neon-green) 2px, transparent 2px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 30px 30px;
            z-index: 5;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Ligne d'horizon tactique */
        .horizon-line {
            position: absolute;
            top: 50%; left: 5%; width: 90%; height: 1px;
            background: rgba(0, 255, 65, 0.15);
            z-index: 4;
            pointer-events: none;
        }

        img { width: 100%; max-height: 60vh; object-fit: contain; }

        /* Animation d'allumage caméra */
        .camera-boot {
            animation: camera-flicker 0.4s ease-out forwards;
        }

        @keyframes camera-flicker {
            0% { opacity: 0; filter: brightness(5) blur(10px); transform: scaleY(0.005); }
            50% { opacity: 0.5; transform: scaleY(1); }
            100% { opacity: 1; filter: brightness(1) blur(0); transform: scale(1); }
        }

        /* Data Display */
        .data-overlay {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-top: 10px;
        }

        .data-card {
            background: var(--panel-bg);
            border-left: 3px solid var(--neon-green);
            padding: 12px;
            transition: all 0.2s ease;
        }

        .label { font-size: 0.65rem; opacity: 0.6; display: block; }
        .value { font-size: 1.5rem; font-family: 'Ubuntu Mono', monospace; }

        .angle-gauge {
            width: 100%; height: 4px;
            background: rgba(0, 255, 65, 0.1);
            margin-top: 8px; position: relative;
        }
        #angle-cursor {
            position: absolute;
            top: -4px; left: 50%;
            width: 2px; height: 12px;
            background: var(--neon-green);
            transition: left 0.1s ease;
        }

        .rec-dot {
            width: 10px; height: 10px;
            background: #ff0000; border-radius: 50%;
            display: inline-block; margin-right: 8px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="boot-text" id="boot-log">INITIALIZING SYSTEM...</div>
    <div style="width: 200px; height: 2px; background: rgba(0,255,65,0.2); margin-top:10px;">
        <div id="boot-progress" style="width: 0%; height: 100%; background: var(--neon-green); transition: width 0.2s;"></div>
    </div>
</div>

<div class="main-frame">
    <header>
        <div><span class="rec-dot"></span>LIVE_FEED_01</div>
        <div style="font-weight: bold;">SLAYBOT // TACTICAL_OS</div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="video-container">
        <div class="horizon-line"></div>
        <img src="/video_feed" onerror="this.src='https://via.placeholder.com/640x480/050505/00FF41?text=SIGNAL_LOST...'">
    </div>

    <div class="data-overlay">
        <div class="data-card">
            <span class="label">// STEERING_ANGLE</span>
            <span id="angle_val" class="value">0°</span>
            <div class="angle-gauge">
                <div id="angle-cursor"></div>
            </div>
        </div>

        <div class="data-card">
            <span class="label">// NAV_HINT</span>
            <span id="turn" class="value">FORWARD</span>
        </div>

        <div class="data-card" id="color-card">
            <span class="label">// CHROMA_TARGET</span>
            <span id="color" class="value">NULL</span>
        </div>
    </div>
</div>
<script>
    // FAVICON ANIMÉ (Caméra qui clignote)
    const favicon = document.getElementById('favicon');
    const canvas = document.createElement('canvas');
    canvas.width = 32; canvas.height = 32;
    const ctx = canvas.getContext('2d');

    function updateFavicon(color) {
        ctx.clearRect(0, 0, 32, 32);
        ctx.fillStyle = color;
        ctx.fillRect(4, 8, 18, 14); 
        ctx.beginPath();
        ctx.moveTo(22, 12); ctx.lineTo(28, 8); ctx.lineTo(28, 22); ctx.lineTo(22, 18);
        ctx.fill();
        favicon.href = canvas.toDataURL('image/png');
    }

    let toggle = false;
    setInterval(() => {
        updateFavicon(toggle ? "#00ff41" : "#000000");
        toggle = !toggle;
    }, 1000);

    // SÉQUENCE DE BOOT (Lancement du système)
    window.onload = () => {
        const logs = ["CONNECTING...", "SYNCING_CAMERA...", "CV_MODULE_LOADED", "TARGET_LOCKED", "SYSTEM_ONLINE"];
        let step = 0;
        const logEl = document.getElementById('boot-log');
        const progressEl = document.getElementById('boot-progress');
        const bootScreen = document.getElementById('boot-screen');
        const cameraImg = document.querySelector('.video-container img');

        const bootSequence = setInterval(() => {
            if (step < logs.length) {
                logEl.innerText = logs[step];
                progressEl.style.width = ((step + 1) / logs.length) * 100 + "%";
                step++;
            } else {
                clearInterval(bootSequence);
                bootScreen.style.opacity = "0";
                setTimeout(() => {
                    bootScreen.style.display = "none";
                    cameraImg.classList.add('camera-boot');
                }, 500);
            }
        }, 300);
    };

    // HORLOGE TACTIQUE
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // RÉCUPÉRATION DES DONNÉES (FETCH)
    async function updateData() {
        try {
            const response = await fetch('/status');
            const data = await response.json();

            // 1. Mise à jour de l'angle et du curseur
            const angle = data.angle || 0;
            document.getElementById('angle_val').innerText = angle + "°";
            const percentage = ((angle + 45) / 90) * 100;
            document.getElementById('angle-cursor').style.left = Math.min(Math.max(percentage, 0), 100) + "%";

            // 2. Mise à jour de l'indication de virage (On nettoie le préfixe de couleur)
            // Python envoie "ROUGE_LEFT", on ne garde que "LEFT"
            const fullHint = data.hint || "SEARCHING";
            const cleanHint = fullHint.includes('_') ? fullHint.split('_')[1] : fullHint;
            document.getElementById('turn').innerText = cleanHint;

            // 3. Mise à jour de la couleur cible
            const colorName = data.color || "NONE";
            const colorDisplay = document.getElementById('color');
            const card = document.getElementById('color-card');
            
            colorDisplay.innerText = colorName;

            if(colorName !== "NONE" && colorName !== "") {
                const hexColor = getCSSColor(colorName);
                card.style.borderLeftColor = hexColor;
                card.style.boxShadow = `inset 5px 0 10px ${hexColor}33`; // Ajoute une lueur de la couleur détectée
            } else {
                card.style.borderLeftColor = "var(--neon-green)";
                card.style.boxShadow = "none";
            }
        } catch (err) {
            // En cas d'erreur, on ne bloque pas le système
        } finally {
            // On relance la mise à jour après 100ms pour éviter de saturer le réseau
            setTimeout(updateData, 100);
        }
    }

    function getCSSColor(colorName) {
        const colors = { 
            "JAUNE": "#ffff00", 
            "BLEU": "#0088ff", 
            "ROUGE": "#ff3333", 
            "VERT": "#33ff33" 
        };
        return colors[colorName] || "var(--neon-green)";
    }

    // Lancement de la boucle de données
    updateData();
</script>

</body>
</html>
