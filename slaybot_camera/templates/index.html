<!DOCTYPE html>
<html lang="fr">
<head>
    <title>SLAYBOT | TACTICAL VISION</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-green: #00ff41;
            --bg-black: #0a0a0a;
            --panel-bg: rgba(0, 255, 65, 0.03);
            --font-main: 'Segoe UI', 'Ubuntu Mono', monospace;
        }

        body { 
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: var(--font-main);
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Scanlines Effect */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
            z-index: 100; pointer-events: none;
        }

        .main-frame {
            position: relative;
            width: 90vw; max-width: 1000px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 10px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            font-size: 0.9rem;
        }

        .video-container {
            position: relative;
            background: #000;
            line-height: 0;
            border: 1px solid rgba(0, 255, 65, 0.1);
        }

        img { width: 100%; max-height: 60vh; object-fit: contain; }

        .data-overlay {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-top: 10px;
        }

        .data-card {
            background: var(--panel-bg);
            border-left: 3px solid var(--neon-green);
            padding: 12px;
            transition: all 0.2s ease;
        }

        .label { font-size: 0.65rem; opacity: 0.6; display: block; }
        .value { font-size: 1.5rem; font-family: 'Ubuntu Mono', monospace; }

        /* JAUGE D'ANGLE */
        .angle-gauge {
            width: 100%; height: 4px;
            background: rgba(0, 255, 65, 0.1);
            margin-top: 8px; position: relative;
        }
        #angle-cursor {
            position: absolute;
            top: -4px; left: 50%;
            width: 2px; height: 12px;
            background: var(--neon-green);
            transition: left 0.1s ease;
        }

        .rec-dot {
            width: 10px; height: 10px;
            background: #ff0000; border-radius: 50%;
            display: inline-block; margin-right: 8px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="main-frame">
    <header>
        <div><span class="rec-dot"></span>LIVE_FEED_01</div>
        <div style="font-weight: bold;">SLAYBOT // ANGLE_CONTROL_OS</div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="video-container">
        <img src="/video_feed" onerror="this.src='https://via.placeholder.com/640x480/050505/00FF41?text=SIGNAL_LOST...'">
    </div>

    <div class="data-overlay">
        <div class="data-card">
            <span class="label">// STEERING_ANGLE</span>
            <span id="angle_val" class="value">0°</span>
            <div class="angle-gauge">
                <div id="angle-cursor"></div>
            </div>
        </div>

        <div class="data-card">
            <span class="label">// NAV_HINT</span>
            <span id="turn" class="value">FORWARD</span>
        </div>

        <div class="data-card" id="color-card">
            <span class="label">// CHROMA_TARGET</span>
            <span id="color" class="value">NULL</span>
        </div>
    </div>
</div>

<script>
    // Horloge
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Mise à jour des données
    setInterval(() => {
        fetch('/status')
            .then(r => r.json())
            .then(data => {
                const angle = data.angle || 0;
                document.getElementById('angle_val').innerText = angle + "°";
                document.getElementById('turn').innerText = data.turn.split('_').pop(); // Affiche juste FORWARD, LEFT...
                document.getElementById('color').innerText = data.color;

                const percentage = ((angle + 45) / 90) * 100;
                document.getElementById('angle-cursor').style.left = percentage + "%";

                const card = document.getElementById('color-card');
                if(data.color !== "NONE" && data.color !== "") {
                    card.style.borderColor = getCSSColor(data.color);
                    card.style.background = "rgba(0, 255, 65, 0.1)";
                } else {
                    card.style.borderColor = "var(--neon-green)";
                    card.style.background = "var(--panel-bg)";
                }
            })
            .catch(() => {});
    }, 100);

    function getCSSColor(colorName) {
        const colors = { "JAUNE": "#ffff00", "BLEU": "#0000ff", "ROUGE": "#ff0000", "VERT": "#00ff00" };
        return colors[colorName] || "var(--neon-green)";
    }
</script>

</body>
</html>
