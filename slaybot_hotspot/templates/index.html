<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Slaybot WiFi Router</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid #00ff00; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .stat-val { color: #00ff00; font-weight: bold; font-family: monospace; font-size: 1.1em; }
        .label { color: #aaa; }
    </style>
</head>
<body>
    <h1>Slaybot WiFi Router - Statistiques</h1>

    <div class="card">
        <h2>Hotspot (wlan0)</h2>
        <p><span class="label">SSID :</span> <b>Slaybot</b></p>
        <p><span class="label">IP :</span> <span class="stat-val">10.42.0.1</span></p>
        <p><span class="label">État :</span> <span class="stat-val" id="ap_status">Chargement...</span></p>
    </div>

    <div class="card" style="border-left-color: #007bff;">
        <h2>Connexion Internet (wlan1)</h2>
        <p><span class="label">SSID :</span> <span id="inet_ssid" class="stat-val">Recherche...</span></p>
        <p><span class="label">Signal :</span> <span id="inet_signal" class="stat-val">--</span> %</p>
    </div>

    <div class="card" style="border-left-color: #ffaa00;">
        <h2>Système</h2>
        <p><span class="label">Température CPU :</span> <span id="cpu_temp" class="stat-val">--</span> °C</p>
        <p><span class="label">Usage CPU :</span> <span id="cpu_usage" class="stat-val">--</span> %</p>
        <p><span class="label">RAM utilisée :</span> <span id="ram_usage" class="stat-val">--</span> Mo</p>
    </div>

    <script>
        function updateStats() {
            fetch('/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('cpu_temp').innerText = data.cpu_temp;
                    document.getElementById('cpu_usage').innerText = data.cpu_usage;
                    document.getElementById('ram_usage').innerText = data.ram_usage;
                    document.getElementById('inet_ssid').innerText = data.inet_ssid;
                    document.getElementById('inet_signal').innerText = data.inet_signal;
                    document.getElementById('ap_status').innerText = data.ap_status;
                })
                .catch(err => console.error("Erreur de mise à jour:", err));
        }

        // Met à jour toutes les 3 secondes pour ne pas surcharger le CPU
        setInterval(updateStats, 3000);
        updateStats(); // Premier appel immédiat
    </script>
</body>
</html>
