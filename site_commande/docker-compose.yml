version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_restaurant
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: ./restaurant_site
    container_name: restaurant_app
    restart: unless-stopped
    command: python app.py
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./restaurant_site:/app
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      POSTGRES_HOST: db
      HOTSPOT_WS_URL: ${HOTSPOT_WS_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    environment:
      TUNNEL_ORIGIN_CERT: /etc/cloudflared/cert.pem
    command: tunnel --config /etc/cloudflared/config.yml run restaurant_app

volumes:
  postgres_data: