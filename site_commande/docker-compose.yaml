version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_restaurant
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: ./restaurant_app
    container_name: restaurant_app
    command: python app.py
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./restaurant_app:/app
    environment:
      POSTGRES_HOST: db
      HOTSPOT_WS_URL: ws://host.docker.internal:8765
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    depends_on:
      - web
    volumes:
      - ./cloudflared:/etc/cloudflared
    environment:
      - TUNNEL_ORIGIN_CERT=/etc/cloudflared/cert.pem
    command: tunnel --config /etc/cloudflared/config.yml run restaurant_app

volumes:
  postgres_data: