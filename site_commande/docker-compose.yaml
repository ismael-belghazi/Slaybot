version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_restaurant
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: ./restaurant_app
    container_name: restaurant_app
    command: python app.py
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./restaurant_app:/app

volumes:
  postgres_data: